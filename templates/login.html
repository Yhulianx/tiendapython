<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="login-container">

        <h1>Iniciar Sesión</h1>

        <form action="/validar_login" method="POST">

            <input
                type="text"
                name="usuario"
                placeholder="Usuario"
                required
            >

            <input
                type="email"
                name="correo"
                placeholder="Correo"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

    </div>

</body>
</html>
